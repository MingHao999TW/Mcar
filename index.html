<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M車有錢｜精選中古車</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Noto Sans TC",sans-serif}
body{background:#f4f6f8;color:#222}

header{background:#000;color:#fff;padding:18px;text-align:center;border-bottom:3px solid #e53935}
header h1{font-size:28px;letter-spacing:2px}
header p{opacity:.85;font-size:14px}

.hero{background:#000 url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600') center/cover;height:240px;display:flex;align-items:center;justify-content:center;color:#fff}
.hero h2{background:rgba(0,0,0,.6);padding:15px 25px;border-radius:10px}

.container{max-width:1200px;margin:25px auto;padding:0 15px}

.search{
margin-bottom:15px;
display:flex;
gap:10px
}

.search input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ddd
}

.filter{
display:flex;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap
}

.filter button{
padding:8px 14px;
border:none;
background:#000;
color:#fff;
border-radius:8px;
cursor:pointer
}

.cars{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}

.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,.08);position:relative}

.sold{
position:absolute;
top:10px;
left:10px;
background:#e53935;
color:#fff;
padding:6px 12px;
border-radius:6px;
font-size:12px;
font-weight:bold;
z-index:2
}

.card.sold-card{
opacity:.5
}

.slider{
position:relative
}

.slider img{
width:100%;
height:190px;
object-fit:cover
}

.badge{
position:absolute;
bottom:10px;
right:10px;
background:#000;
color:#fff;
padding:4px 8px;
border-radius:6px;
font-size:12px
}

.info{padding:15px}
.price{color:#e53935;font-size:22px;font-weight:bold;margin:8px 0}

.btn{
display:block;
text-align:center;
background:#000;
color:#fff;
padding:12px;
border-radius:10px;
text-decoration:none;
margin-top:10px;
font-weight:bold
}

.feature{background:#fff;padding:18px;border-radius:12px;margin-bottom:20px;box-shadow:0 4px 12px rgba(0,0,0,.05);text-align:center;font-weight:bold;line-height:1.8}

.contact{background:#000;color:#fff;padding:30px;text-align:center;margin-top:40px}
.contact a{color:#fff;text-decoration:none;background:#25D366;padding:14px 22px;border-radius:10px;display:inline-block;margin-top:10px;font-weight:bold}

footer{text-align:center;padding:15px;font-size:13px;color:#777;margin-bottom:70px}

.fixed-bar{position:fixed;bottom:0;left:0;width:100%;display:flex;z-index:999}
.fixed-btn{flex:1;text-align:center;padding:16px;color:#fff;text-decoration:none;font-weight:bold}
.line{background:#25D366}
.call{background:#e53935}

</style>
</head>
<body>

<header>
<h1>M車有錢</h1>
<p>優質中古車｜全額貸款｜全台交車｜LINE快速詢問</p>
</header>

<section class="hero">
<h2>精選車輛 即刻帶走</h2>
</section>

<div class="container">

<div class="feature">
🔥 全額貸款可辦<br>
🔥 低頭款可談<br>
🔥 車輛每日更新<br>
🔥 點擊直接LINE詢問
</div>

<div class="search">
<input type="text" placeholder="搜尋車型 例如 Altis / CRV / BMW" onkeyup="searchCar(this.value)">
</div>

<div class="filter">
<button onclick="filterCar('all')">全部</button>
<button onclick="filterCar('sedan')">轎車</button>
<button onclick="filterCar('suv')">SUV</button>
<button onclick="filterCar('cheap')">30萬內</button>
</div>

<div class="cars" id="carList">

<div class="card" data-name="2018 Toyota Altis" data-type="sedan" data-price="36" data-time="3">
<div class="slider">
<img src="https://images.unsplash.com/photo-1549924231-f129b911e442?q=80&w=1200">
<div class="badge">熱門</div>
</div>
<div class="info">
<h3>2018 Toyota Altis</h3>
<p>里程6萬｜省油代步</p>
<div class="price">36.8萬</div>
<a class="btn" onclick="contactCar('2018 Toyota Altis')">LINE 詢問</a>
</div>
</div>

<div class="card" data-name="2020 Honda CRV" data-type="suv" data-price="78" data-time="2">
<div class="slider">
<img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1200">
<div class="badge">SUV</div>
</div>
<div class="info">
<h3>2020 Honda CRV</h3>
<p>一手車｜ACC</p>
<div class="price">78.8萬</div>
<a class="btn" onclick="contactCar('2020 Honda CRV')">LINE 詢問</a>
</div>
</div>

<div class="card sold-card" data-name="2015 Mazda 3" data-type="sedan cheap" data-price="25" data-time="1">
<div class="sold">已售出</div>
<div class="slider">
<img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?q=80&w=1200">
<div class="badge">便宜</div>
</div>
<div class="info">
<h3>2015 Mazda 3</h3>
<p>代步便宜</p>
<div class="price">25.8萬</div>
<a class="btn" onclick="contactCar('2015 Mazda 3')">LINE 詢問</a>
</div>
</div>

</div>
</div>

<section class="contact">
<h2>聯絡我看車</h2>
<a href="https://line.me/ti/p/~s911034">加LINE</a>
<p>電話：0933-718-591</p>
</section>

<footer>© M車有錢</footer>

<div class="fixed-bar">
<a class="fixed-btn line" href="https://line.me/ti/p/~s911034">LINE詢問</a>
<a class="fixed-btn call" href="tel:0933718591">立即撥打</a>
</div>

<script>
function contactCar(name){
const url=`https://line.me/R/msg/text/?我想詢問車輛:${name}`;
window.open(url)
}

function searchCar(text){
text=text.toLowerCase()
const cards=document.querySelectorAll('.card')
cards.forEach(card=>{
const name=card.dataset.name.toLowerCase()
card.style.display=name.includes(text)?'block':'none'
})
}

function filterCar(type){
const cards=document.querySelectorAll('.card')

cards.forEach(card=>{
if(type==='all'){
card.style.display='block'
return
}

if(type==='cheap'){
if(parseInt(card.dataset.price)<=30) card.style.display='block'
else card.style.display='none'
return
}

if(card.dataset.type.includes(type)){
card.style.display='block'
}else{
card.style.display='none'
}
})
}

// 排序最新
const list=document.getElementById('carList')
const items=[...list.children]
items.sort((a,b)=>b.dataset.time-a.dataset.time)
items.forEach(el=>list.appendChild(el))
// 排序最新
const list=document.getElementById('carList')
const items=[...list.children]
items.sort((a,b)=>b.dataset.time-a.dataset.time)
items.forEach(el=>list.appendChild(el))

// ====== 簡易後台 ======
function openAdmin(){
const pass=prompt("請輸入後台密碼")
if(pass!=="1234") return

document.getElementById('admin').style.display='block'
}

function addCar(){
const name=document.getElementById('a_name').value
const price=document.getElementById('a_price').value
const type=document.getElementById('a_type').value
const img=document.getElementById('a_img').value

const time=Date.now()

const html=`
<div class="card" data-name="${name}" data-type="${type}" data-price="${price}" data-time="${time}">
<div class="slider">
<img src="${img}">
<div class="badge">新上架</div>
</div>
<div class="info">
<h3>${name}</h3>
<p>歡迎來電詢問</p>
<div class="price">${price}萬</div>
<a class="btn" onclick="contactCar('${name}')">LINE 詢問</a>
</div>
</div>
`

document.getElementById('carList').insertAdjacentHTML('afterbegin',html)

saveCars()
}

function saveCars(){
localStorage.setItem('cars',document.getElementById('carList').innerHTML)
}

function loadCars(){
const data=localStorage.getItem('cars')
if(data){
document.getElementById('carList').innerHTML=data
}
}

loadCars()
</script>

<!-- 後台 -->
<div id="admin" style="display:none;position:fixed;right:10px;bottom:80px;background:#fff;padding:15px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.2);width:260px;z-index:9999">
<h3>新增車輛</h3>
<input id="a_name" placeholder="車名" style="width:100%;margin-bottom:5px">
<input id="a_price" placeholder="價格(數字)" style="width:100%;margin-bottom:5px">
<select id="a_type" style="width:100%;margin-bottom:5px">
<option value="sedan">轎車</option>
<option value="suv">SUV</option>
<option value="cheap">便宜</option>
</select>
<input id="a_img" placeholder="圖片網址" style="width:100%;margin-bottom:5px">
<button onclick="addCar()" style="width:100%;background:#000;color:#fff;padding:8px">新增</button>
</div>

<button onclick="openAdmin()" style="position:fixed;right:10px;bottom:140px;background:#000;color:#fff;border:none;padding:10px;border-radius:8px;z-index:9999">
後台
</button>

</body>
</html>
</html>
